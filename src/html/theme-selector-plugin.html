<div class="theme-selector" role="region" aria-labelledby="themeSelectorHeader">
  <label for="themeSelectEl">Choose a theme:</label>
  <select id="themeSelectEl" aria-describedby="themeDescriptionEl">
    <option value="dark" data-desc="Dimmed elegance 🌑">Dark</option>
    <option value="light" data-desc="Bright & clean ☀️">Light</option>
    <option value="cosmic" data-desc="Galactic glow 🌌">Cosmic</option>
    <option value="forest" data-desc="Earthy calm 🌲">Forest</option>
    <option value="frost" data-desc="Cool & crisp ❄️">Frost</option>
    <option value="matrix" data-desc="Digital green 💻">Matrix</option>
    <option value="ocean" data-desc="Deep blue 🌊">Ocean</option>
    <option value="retro" data-desc="Old-school vibes 🕹️">Retro</option>
    <option value="sunset" data-desc="Warm twilight 🌇">Sunset</option>
  </select>

  <button id="resetThemeEl">♻️ Reset</button>
  <p id="themeDescriptionEl" class="theme-desc" aria-live="polite"></p>
</div>
