<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Mosberg's Github.io Page" />
    <meta name="keywords" content="github" />
    <meta name="author" content="Mosberg" />
    <meta name="theme-color" content="#2962ff" />

    <!-- SEO and Social Meta Tags -->
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Mosberg.github.io" />
    <meta property="og:description" content="Mosberg's Github.io Page" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mosberg.github.io/" />
    <meta
      property="og:image"
      content="https://mosberg.github.io/src/images/favicon.webp"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mosberg.github.io" />
    <meta name="twitter:description" content="Mosberg's Github.io Page" />
    <meta
      name="twitter:image"
      content="https://mosberg.github.io/src/images/favicon.webp"
    />

    <title>Mosberg.github.io</title>

    <link
      rel="icon"
      href="https://mosberg.github.io/src/images/favicon.webp"
      type="image/x-icon"
    />

    <link
      rel="stylesheet"
      href="https://mosberg.github.io/src/styles/style.css"
    />
  </head>

  <body>
    <!-- Skip link for keyboard users -->
    <a
      href="#mainContent"
      class="skip-link"
      style="
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      "
    >
      Skip to main content
    </a>

    <header>
      <h1>Mosberg's Github.io Page</h1>
      <p id="visitCounter"></p>
      <nav aria-label="Theme selector">
        <select id="themeSelectEl">
          <option value="light">☀️ Light</option>
          <option value="dark">🌑 Dark</option>
          <option value="retro">🕹️ Retro</option>
          <option value="cosmic">🌌 Cosmic</option>
          <option value="sunset">🌇 Sunset</option>
          <option value="earth">🌍 Earth</option>
          <option value="ocean">🌊 Ocean</option>
          <option value="solarized">🔆 Solarized</option>
        </select>
      </nav>
    </header>

    <nav role="navigation" aria-label="Primary navigation">
      <!-- Nav for dynamically loaded content here -->
    </nav>

    <main id="mainContent" role="main">
      <!-- Content will dynamically be loaded here -->
    </main>

    <footer role="contentinfo">
      <p>&copy; <span id="year"></span> Mosberg. All rights reserved.</p>
    </footer>

    <script
      src="https://mosberg.github.io/src/scripts/visit_counter.js"
      defer
    ></script>
    <script
      src="https://mosberg.github.io/src/scripts/theme_selector.js"
      defer
    ></script>
    <script
      src="https://mosberg.github.io/src/scripts/dynamic_year.js"
      defer
    ></script>
  </body>
</html>
